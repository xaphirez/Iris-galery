# =====================================================
# Netlify CMS — Konfigurasi
# =====================================================

backend:
  name: git-gateway
  branch: main  # Ganti ke "master" kalau repo kamu pakai branch master

# Folder tempat gambar disimpan saat kakak upload lewat CMS
media_folder: "images/gallery"
public_folder: "images/gallery"

collections:

  # ---- KOLEKSI KARYA / GALERI ----
  - name: "gallery"
    label: "🖼️ Galeri Karya"
    label_singular: "Karya"
    folder: "_data/gallery"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Judul Karya"
        name: "title"
        widget: "string"
        hint: "Contoh: Dream Weaver"

      - label: "Gambar"
        name: "image"
        widget: "image"
        hint: "Upload gambar karya (JPG atau PNG)"

      - label: "Kategori"
        name: "filter"
        widget: "select"
        options:
          - { label: "Ilustrasi Digital", value: "digital" }
          - { label: "Sketsa", value: "sketch" }
          - { label: "Karakter", value: "character" }
          - { label: "Landscape", value: "landscape" }

      - label: "Tahun"
        name: "year"
        widget: "number"
        default: 2024
        value_type: "int"
        min: 2000
        max: 2099

      - label: "Deskripsi (opsional)"
        name: "description"
        widget: "text"
        required: false
        hint: "Cerita singkat di balik karya ini"

  # ---- INFO SENIMAN (ABOUT) ----
  - name: "about"
    label: "👤 Info Seniman"
    files:
      - label: "Profil"
        name: "profile"
        file: "_data/about.json"
        fields:
          - label: "Nama"
            name: "name"
            widget: "string"
            default: "Anya"

          - label: "Foto"
            name: "photo"
            widget: "image"
            media_folder: "images/about"
            public_folder: "images/about"
            required: false

          - label: "Bio (paragraf 1)"
            name: "bio1"
            widget: "text"

          - label: "Bio (paragraf 2)"
            name: "bio2"
            widget: "text"
            required: false

          - label: "Jumlah Karya"
            name: "artworks"
            widget: "string"
            default: "40+"

          - label: "Tahun Berkarya"
            name: "years"
            widget: "string"
            default: "3"

  # ---- INFO KONTAK ----
  - name: "contact"
    label: "📬 Kontak & Sosmed"
    files:
      - label: "Kontak"
        name: "contact"
        file: "_data/contact.json"
        fields:
          - label: "Instagram (username saja)"
            name: "instagram"
            widget: "string"
            required: false
            hint: "Contoh: anyaart (tanpa @)"

          - label: "Email"
            name: "email"
            widget: "string"
            required: false

          - label: "Nomor WhatsApp"
            name: "whatsapp"
            widget: "string"
            required: false
            hint: "Format internasional tanpa + — contoh: 6281234567890"
